{% extends 'base.html' %}

{% block content %}
    <a href="{% url 'blog:post_list' %}">Back</a>
    <p>Post Title: {{ post.title }}</p>
    <p>
        Author: {{ post.author }} | Date: {{ post.update_time }}
    </p><br/>
    <p>{{ post.content }}</p>
    {% if post.author == request.user %}
        <a href="{% url 'blog:edit_post' post.id %}">Edit</a>
    {% endif %}
{% endblock %}
