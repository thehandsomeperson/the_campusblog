{% extends 'base.html' %}

{% block content %}
    <h1>Recent Posts</h1>
    {% for post in posts %}
        <h5>Post Title: {{ post.title }}</h5>
        <p>Author: {{ post.author }}| Date: {{ post.update_time }}</p>
        <p>{{ post.content }}</p>
    {% empty %}
        <p>No posts here</p>
    {% endfor %}
{% endblock %}
